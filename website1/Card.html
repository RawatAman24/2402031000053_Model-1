<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Cart Page </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body{
      background:#f4f4f4;
    }
    .cart-box{
      background:#fff;
      border-radius:10px;
      padding:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }
    .product-img{
      width:100px;
      height:100px;
      object-fit:cover;
      border-radius:10px;
    }
    .qty-btn{
      width:35px;
      height:35px;
      border:none;
      background:orange;
      color:#000;
      font-size:18px;
      border-radius:5px;
    }
    .qty-input{
      width:50px;
      text-align:center;
      border:1px solid #ccc;
      border-radius:5px;
      height:35px;
    }
    .remove-btn{
      border:none;
      background:red;
      color:#fff;
      padding:8px 15px;
      border-radius:5px;
    }
    .cart-total{
      font-size:22px;
      font-weight:bold;
      color:orange;
    }
    .btn-shop{
      background:#222;
      color:#fff;
    }
    .btn-shop:hover{
      background:#000;
      color:#fff;
    }
    .btn-checkout{
      background:orange;
      color:#000;
      font-weight:bold;
    }
    .btn-checkout:hover{
      background:#e69500;
      color:#000;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <h2 class="text-center mb-4"> Shopping Cart </h2>
    <div class="cart-box">
      <div class="row align-items-center mb-4 product">
        <div class="col-md-2 text-center">
          <img src="shopping (1).webp"
            class="product-img" alt="Boot" >
        </div>
        <div class="col-md-3">
          <h5>Crosshunt Waterproof Boot</h5>
          <p>₹3599</p>
        </div>
        <div class="col-md-3">
          <button class="qty-btn minus"> - </button>
          <input type="text" value="1" class="qty-input">
          <button class="qty-btn plus"> + </button>
        </div>
        <div class="col-md-2">
          <strong>₹3599</strong>
        </div>
        <div class="col-md-2">
          <button class="remove-btn"> Remove </button>
        </div>
      </div>
      <div class="row align-items-center mb-4 product">
        <div class="col-md-2 text-center">
          <img src="shopping (2).webp"
            class="product-img" alt="Boot" >
        </div>
        <div class="col-md-3">
          <h5> Vellinto Men's Stony Casual </h5>
          <p>₹3999</p>
        </div>
        <div class="col-md-3">
          <button class="qty-btn minus"> - </button>
          <input type="text" value="1" class="qty-input">
          <button class="qty-btn plus">  + </button>
        </div>
        <div class="col-md-2">
          <strong>₹3999</strong>
        </div>
        <div class="col-md-2">
          <button class="remove-btn"> Remove </button>
        </div>
      </div>
      <div class="d-flex justify-content-between align-items-center mt-4">
        <div class="cart-total"> Total: ₹3999 </div>
        <div>
          <a href="menu.html" class="btn btn-shop me-2"> Continue Shopping </a>
          <a href="Payment.html" class="btn btn-checkout"> Checkout </a>
        </div>
      </div>
    </div>
  </div>
  <script>
function updateTotal(){
  let total = 0;
  document.querySelectorAll(".product").forEach(product => {
    let price = parseInt( product.querySelector("strong").innerText.replace("₹","") );
    let qty = parseInt( product.querySelector(".qty-input").value );
    total += price * qty;
  });
  document.querySelector(".cart-total").innerText =
    "Total: ₹" + total;
}
document.querySelectorAll(".plus").forEach(button => {
  button.addEventListener("click", function(){
    let input = this.parentElement.querySelector(".qty-input");
    input.value = parseInt(input.value) + 1;
    updateTotal();
  });
});
document.querySelectorAll(".minus").forEach(button => {
  button.addEventListener("click", function(){
    let input = this.parentElement.querySelector(".qty-input");
    if(parseInt(input.value) > 1){
      input.value = parseInt(input.value) - 1;
      updateTotal();
    }
  });
});
document.querySelectorAll(".remove-btn").forEach(button => {
  button.addEventListener("click", function(){
    this.closest(".product").remove();
    updateTotal();
  });
});
updateTotal();
  </script>
</body>
</html>
