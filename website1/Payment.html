<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Form</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }
    body{
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .payment-box{
      width:350px;
      background:#fff;
      padding:30px;
      border-radius:10px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }
    .payment-box h2{
      text-align:center;
      margin-bottom:20px;
    }
    .input-box{
      margin-bottom:15px;
    }
    .input-box input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:5px;
      outline:none;
    }
    .pay-btn{
      width:100%;
      padding:12px;
      border:none;
      background:orange;
      color:#000;
      font-size:16px;
      border-radius:6px;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <div class="payment-box">
    <h2>Payment Form</h2>
    <form>
      <div class="input-box">
        <input type="text" placeholder="Card Holder Name" required>
      </div>
      <div class="input-box">
        <input type="text" placeholder="Card Number" required>
      </div>
      <div class="input-box">
        <input type="text" placeholder="Expiry Date" required>
      </div>
      <div class="input-box">
        <input type="password" placeholder="CVV" required>
      </div>
      <button type="submit" class="pay-btn">
        Pay Now
      </button>
    </form>
  </div>
</body>
</html>
