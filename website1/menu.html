<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Boot Store </title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }
    body{
      background:#f5f5f5;
    }
    nav{
      background:#222;
      padding:15px 20px;
    }
    .menu{
      display:flex;
      justify-content:center;
      list-style:none;
      gap:30px;
    }
    .menu li a{
      color:#fff;
      text-decoration:none;
      font-size:18px;
      transition:0.3s;
    }
    .menu li a:hover{
      color:orange;
    }
    .Boot{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
      padding:40px;
    }
    .card{
      background:#fff;
      padding:20px;
      border-radius:12px;
      text-align:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }
    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
      border-radius:10px;
    }
    .card h2{
      margin-top:15px;
      color:#333;
    }
    .card p{
      margin-top:8px;
      color:#555;
    }
    .price{
      font-size:20px;
      font-weight:bold;
      color:green;
    }
    .btn-box{
      margin-top:15px;
      display:flex;
      justify-content:center;
      gap:10px;
    }
    button{
      padding:10px 18px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-size:15px;
      transition:0.3s;
    }
    .buy-btn{
      background:orange;
      color:#fff;
    }
    .buy-btn:hover{
      background:darkorange;
    }
    .cart-btn{
      background:#222;
      color:#fff;
    }
    .cart-btn:hover{
      background:#444;
    }
  </style>
</head>
<body>
  <nav>
    <ul class="menu">
      <li><a href="Home.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="Card.html">Card</a></li>
      <li><a href="contanct.html">Contact</a></li>
      <li><a href="Login.html">Login</a></li>
    </ul>
  </nav>
  <div class="Boot">
    <div class="card">
      <img src="shopping (1).webp" alt="Boot Image">
      <h2>Boots</h2>
      <p>Crosshunt Waterproof</p>
      <p class="price">₹3,599</p>
      <div class="btn-box">
        <a href="payment.html">
          <button class="buy-btn">Buy Now</button>
        </a>
        <a href="cart.html">
          <button class="cart-btn">Add to Cart</button>
        </a>
      </div>
    </div>
    <div class="card">
      <img src="shopping (2).webp" alt="Boot Image">
      <h2>Boots</h2>
      <p>Hitz Men's Lace-up Ankle Boot</p>
      <p class="price">₹4,599</p>
      <div class="btn-box">
        <a href="payment.html">
          <button class="buy-btn">Buy Now</button>
        </a>
        <a href="cart.html">
          <button class="cart-btn">Add to Cart</button>
        </a>
      </div>
    </div>
    <div class="card">
      <img src="shopping (3).webp" alt="Boot Image">
      <h2>Boots</h2>
      <p>Vellinto Men's Stony Casual</p>
      <p class="price">₹3,599</p>
      <div class="btn-box">
        <a href="payment.html">
          <button class="buy-btn">Buy Now</button>
        </a>
        <a href="cart.html">
          <button class="cart-btn">Add to Cart</button>
        </a>
      </div>
    </div>
    <div class="card">
      <img src="shopping (4).webp" alt="Boot Image">
      <h2>Boots</h2>
      <p>Men's Look Boot</p>
      <p class="price">₹4,999</p>
      <div class="btn-box">
        <a href="payment.html">
          <button class="buy-btn">Buy Now</button>
        </a>
        <a href="cart.html">
          <button class="cart-btn">Add to Cart</button>
        </a>
      </div>
    </div>
    <div class="card">
      <img src="shopping (5).webp" alt="Boot Image">
      <h2>Boots</h2>
      <p>Men Black Color-blocked Lace-up</p>
      <p class="price">₹3,899</p>
      <div class="btn-box">
        <a href="payment.html">
          <button class="buy-btn">Buy Now</button>
        </a>
        <a href="cart.html">
          <button class="cart-btn">Add to Cart</button>
        </a>
      </div>
    </div>
  </div>
  <div id="footer1"></div>
    <script src="script.js"></script>
</body>
</html>
