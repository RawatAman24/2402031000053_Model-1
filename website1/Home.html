<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Page</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }
    .home{
      height:100vh;
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }
    .home-content h1{
      font-size:50px;
      margin-bottom:20px;
      color:#222;
    }
    .home-content p{
      font-size:18px;
      margin-bottom:25px;
      color:#555;
    }
    .home-content a{
      text-decoration:none;
      background:orange;
      color:#000;
      padding:12px 25px;
      border-radius:5px;
    }
  </style>
</head>
<body>
  <section class="home">
    <div class="home-content">
      <h1>Welcome to Our Website</h1>
      <p>
        Discover amazing products and modern designs
        with best quality.
      </p>
      <a href="#">Shop Now</a>
        </div>
  </section>
</body>
</html>
