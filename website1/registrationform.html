<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Form</title>
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }
    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f4f4f4;
    }
    .register-box{
      width:400px;
      background:#fff;
      padding:35px;
      border-radius:16px;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
    }
    .register-box h2{
      text-align:center;
      margin-bottom:25px;
      color:#222;
    }
    .input-box{
      position:relative;
      margin-bottom:18px;
    }
    .input-box input{
      width:100%;
      padding:14px 45px 14px 15px;
      border:1px solid #ddd;
      border-radius:8px;
      outline:none;
      font-size:15px;
    }
    .input-box i{
      position:absolute;
      right:15px;
      top:50%;
      transform:translateY(-50%);
      color:#777;
    }
    .register-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:30px;
      background:#f4a000;
      color:#000;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      margin-top:10px;
    }
    .register-btn:hover{
      background:#db9000;
    }
    .login-link{
      text-align:center;
      margin-top:20px;
      font-size:14px;
    }
    .login-link a{
      text-decoration:none;
      color:#f4a000;
      font-weight:bold;
    }
  </style>
</head>
<body>
  <div class="register-box">
    <h2>Create Account</h2>
    <form>
      <div class="input-box">
        <input type="text" placeholder="Full Name" required>
        <i class="fa-solid fa-user"></i>
      </div>
      <div class="input-box">
        <input type="email" placeholder="Email Address" required>
        <i class="fa-solid fa-envelope"></i>
      </div>
      <div class="input-box">
        <input type="tel" placeholder="Phone Number" required>
        <i class="fa-solid fa-phone"></i>
      </div>
      <div class="input-box">
        <input type="password" placeholder="Password" required>
        <i class="fa-solid fa-lock"></i>
      </div>
      <div class="input-box">
        <input type="password" placeholder="Confirm Password" required>
        <i class="fa-solid fa-lock"></i>
      </div>
      <button type="submit" class="register-btn">
        Register
      </button>
      <div class="login-link">
        Already have an account?
        <a href="Login.html">Login</a>
      </div>
    </form>
  </div>
   <div id="footer1"></div>
    <script src="script.js"></script>
</body>
</html>
