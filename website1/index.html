<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <title> Home </title>
    <style>
        body{
            font-family: Arial;
            background-color: #fff3e0;
            text-align: center;
        }
        h1{
            margin-top: 100px;
            color: orange;
        }
        .popup{
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
        }
        .popup-content{
            background-color: white;
            width: 350px;
            margin: 10% auto;
            padding: 20px;
            border-radius: 10px;
            position: relative;
        }
        .popup-content img{
            width: 250px;
            border-radius: 10px;
        }
        .popup-content h2{
            color: orange;
        }
        .popup-content p{
            font-size: 18px;
        }
        .close{
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 25px;
            cursor: pointer;
            color: red;
        }
        button{
            background-color: orange;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        body{
            background-color: #fff3e0;
        }
        .carousel img{
            height: 350px;
            object-fit: cover;
        }
        h1{
            color: orange;
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Welcome to Our Boot Website</h1>
    <div class="popup" id="popup">
        <div class="popup-content">
            <span class="close" id="closeBtn">&times;</span>
            <img src="shopping (1).webp" alt="Boot">
            <h2>Special Offer</h2>
            <p>Get 40% OFF on Boots Today!</p>
            <a href="menu.html">
            <button class="btn">Order Now</button>
            </a>
        </div>
    </div>
    <div id="header1"></div><br></br>
    <script>
        window.onload = function(){
            document.getElementById("popup").style.display = "block";
        }
        document.getElementById("closeBtn").onclick = function(){
            document.getElementById("popup").style.display = "none";
        }
    </script>
</body>
</html>

<body>

<body>
    <h1>Welcome To Boot Store</h1>
    <div id="bootSlider"
    class="carousel slide container"
    data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button type="button"
            data-bs-target="#bootSlider" data-bs-slide-to="0" class="active"> </button>
            <button type="button"
            data-bs-target="#bootSlider" data-bs-slide-to="1"> </button>
            <button type="button"
            data-bs-target="#bootSlider" data-bs-slide-to="2"> </button>
        </div>
        <div class="carousel-inner rounded">
            <div class="carousel-item active">
                <img src="shopping (1).webp"
                class="d-block w-100"
                alt="boot">
            </div>
            <div class="carousel-item">
                <img src="shopping (2).webp" class="d-block w-100" alt="boot">
            </div>
            <div class="carousel-item">
                <img src="shopping (3).webp" class="d-block w-100" alt="boot">
             </div>
        </div>
        <button class="carousel-control-prev" type="button"
        data-bs-target="#bootSlider"
        data-bs-slide="prev">
            <span class="carousel-control-prev-icon"> </span>
        </button>
        <button class="carousel-control-next" type="button"
        data-bs-target="#bootSlider"
        data-bs-slide="next">
            <span class="carousel-control-next-icon"> </span>
        </button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
    <div id="footer1"></div>
    <script src="script.js"></script>
<button onclick="topFunction()" id="topBtn"> ↑ </button>
<style>
#topBtn{
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 99;
    font-size: 20px;
    border: none;
    outline: none;
    background-color: orange;
    color: white;
    cursor: pointer;
    padding: 12px 18px;
    border-radius: 50%;
}
#topBtn:hover{
    background-color: darkorange;
}
</style>
<script>
let mybutton = document.getElementById("topBtn");
window.onscroll = function() {
    scrollFunction();
};
function scrollFunction() {
    if (document.body.scrollTop > 100 ||
        document.documentElement.scrollTop > 100) {
        mybutton.style.display = "block";
    } else {
        mybutton.style.display = "none";
    }
}
function topFunction() {
    document.body.scrollTop = 0;
    document.documentElement.scrollTop = 0;
}
</script>
<div id="footer1"></div>
<script src="script.js"></script>
</body>
</html>
