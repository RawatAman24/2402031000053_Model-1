<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Page</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }
    body{
      background:#f4f4f4;
      padding:40px;
    }
    .card-container{
      display:flex;
      justify-content:center;
      gap:30px;
      flex-wrap:wrap;
    }
    .card{
      width:300px;
      background:#fff;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      text-align:center;
    }
    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }
    .card-content{
      padding:20px;
    }
    .card-content h3{
      margin-bottom:10px;
      color:#222;
    }
    .card-content p{
      color:#555;
      margin-bottom:15px;
    }
    .price{
      font-size:20px;
      font-weight:bold;
      color:orange;
      margin-bottom:15px;
    }
    .btn{
      display:inline-block;
      text-decoration:none;
      background:orange;
      color:#000;
      padding:10px 20px;
      border-radius:5px;
    }
  </style>
</head>
