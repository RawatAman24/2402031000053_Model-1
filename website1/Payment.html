<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Payment Form </title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }
    body{
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }
    .payment-box{
      width:400px;
      background:#fff;
      padding:30px;
      border-radius:10px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }
    .payment-box h2{
      text-align:center;
      margin-bottom:20px;
      color:#222;
    }
    .input-box{
      margin-bottom:15px;
    }
    .input-box input,
    .input-box select{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:5px;
      outline:none;
      font-size:15px;
    }
    .pay-btn{
      width:100%;
      padding:12px;
      border:none;
      background:orange;
      color:#000;
      font-size:16px;
      border-radius:6px;
      cursor:pointer;
      transition:0.3s;
    }
    .pay-btn:hover{
      background:darkorange;
      color:#fff;
    }
    .upi-box{
      display:none;
    }
    .receipt{
      display:none;
      margin-top:20px;
      padding:20px;
      border:1px solid #ddd;
      border-radius:10px;
      background:#fafafa;
    }
    .receipt h3{
      text-align:center;
      margin-bottom:15px;
      color:green;
    }
    .receipt p{
      margin:8px 0;
      color:#333;
    }
  </style>
</head>
<body>
  <div class="payment-box">
    <h2> Payment Form </h2>
    <form id="paymentForm">
      <div class="input-box">
        <select id="paymentMethod" onchange="showPayment()" required>
          <option value="">Select Payment Method</option>
          <option value="card"> Credit / Debit Card </option>
          <option value="upi"> UPI Payment </option>
        </select>
      </div>
      <div id="cardBox">
        <div class="input-box">
          <input type="text" id="cardName" placeholder="Card Holder Name">
        </div>
        <div class="input-box">
          <input type="text" placeholder="Card Number">
        </div>
        <div class="input-box">
          <input type="text" placeholder="Expiry Date">
        </div>
        <div class="input-box">
          <input type="password" placeholder="CVV">
        </div>
      </div>
      <div id="upiBox" class="upi-box">
        <div class="input-box">
          <input type="text" id="upiId" placeholder="Enter UPI ID">
        </div>
      </div>
      <div class="input-box">
        <input type="text" id="amount" value= "₹3,599" readonly>
      </div>
      <button type="submit" class="pay-btn"> Pay Now </button>
    </form>
    <div class="receipt" id="receipt">
      <h3> Payment Successful ✅</h3>
      <p><strong>Receipt No</strong>
        <span id="receiptNo"></span>
      </p>
      <p><strong>Payment Method</strong>
        <span id="receiptMethod"></span>
      </p>
      <p><strong>Amount Paid</strong>
        <span id="receiptAmount"></span>
      </p>
      <p><strong>Date</strong>
        <span id="receiptDate"></span>
      </p>
    </div>
  </div>
  <script>
    function showPayment(){
      let method = document.getElementById("paymentMethod").value;
      let cardBox = document.getElementById("cardBox");
      let upiBox = document.getElementById("upiBox");
      if(method === "upi"){
        upiBox.style.display = "block";
        cardBox.style.display = "none";
      }else{
        upiBox.style.display = "none";
        cardBox.style.display = "block";
      }
    }
    document.getElementById("paymentForm")
    .addEventListener("submit", function(e){
      e.preventDefault();
      let method = document.getElementById("paymentMethod").value;
      let amount = document.getElementById("amount").value;
      let receiptNo = "REC" + Math.floor(Math.random()*100000);
      let date = new Date().toLocaleString();
      document.getElementById("receipt").style.display = "block";
      document.getElementById("receiptNo").innerText = receiptNo;
      document.getElementById("receiptMethod").innerText = method.toUpperCase();
      document.getElementById("receiptAmount").innerText = amount;
      document.getElementById("receiptDate").innerText = date;
      alert("Payment Completed Successfully!");
    });
  </script>
   <div id="footer1"></div>
    <script src="script.js"></script>
</body>
</html>
