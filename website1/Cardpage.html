<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <title>cardpage</title>
    <style>
        body{
            font-family: Arial;
            background:#fff3e0;
            margin:0;
            padding:20px;
        }
        h1{
            text-align:center;
            margin-bottom:30px;
        }
        .card-container{
            max-width:900px;
            margin:auto;
        }
        .card-item{
            background:white;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:20px;
            margin-bottom:20px;
            border-radius:15px;
            box-shadow:0 0 10px gray;
        }
        .card-item img{
            width:120px;
            height:120px;
            object-fit:cover;
            border-radius:10px;
        }
        .details{
            flex:1;
            padding-left:20px;
        }
        .details h2{
            margin:0;
        }
        .price{
            color:green;
            font-size:22px;
            margin:10px 0;
        }
        .quantity-box{
            display:flex;
            align-items:center;
            gap:10px;
        }
        .quantity-box button{
            width:50px;
            height:50px;
            border:none;
            border-radius:50%;
            background:orange;
            color:white;
            font-size:20px;
            cursor:pointer;
            align-items:center;
            justify-content:center;
        }
        .remove-btn{
            background:red;
            color:white;
            border:none;
            padding:10px 15px;
            border-radius:8px;
            cursor:pointer;
        }
        .total-box{
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 0 10px gray;
            text-align:center;
            margin-top:30px;
        }
        .payment-btn{
            background:green;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:8px;
            cursor:pointer;
            font-size:18px;
            margin-top:15px;
        }
        .payment-btn:hover{
            transform:scale(1.05);
        }
    </style>
</head>
<body>
    <div id="header1"></div><br>
    <h1>Your card 🛒</h1>
    <div class="card-container" id="cardContainer">
        <div class="card-item">
            <img src="shopping (1).webp">
            <div class="details">
                <h2>Boot </h2>
                <div class="price" data-price="3,599"> ₹3,599 </div>
                <div class="quantity-box">
                    <button onclick="decrease(this)">-</button>
                    <span class="qty">1</span>
                    <button onclick="increase(this)">+</button>
                </div>
            </div>
            <button class="remove-btn" onclick="removeItem(this)"> Remove </button>
        </div>
         <div class="card-item">
            <img src="shopping (2).webp">
            <div class="details">
                <h2>Boots</h2>
                <div class="price" data-price="4,599"> ₹4,599 </div>
                <div class="quantity-box">
                    <button onclick="decrease(this)">-</button>
                    <span class="qty">1</span>
                    <button onclick="increase(this)">+</button>
                    </div>
                    </div>
                    <button class="remove-btn" onclick="removeItem(this)"> Remove </button>
                        </div>
        <div class="card-item">
            <img src="shopping (3).webp">
            <div class="details">
                <h2>Boots</h2>
                <div class="price" data-price="3,999"> ₹3,999 </div>
                <div class="quantity-box">
                    <button onclick="decrease(this)">-</button>
                    <span class="qty">1</span>
                    <button onclick="increase(this)">+</button>
                </div>
            </div>
            <button class="remove-btn" onclick="removeItem(this)"> Remove </button>
        </div>
    <div class="card-item">
            <img src="shopping (4).webp">
            <div class="details">
                <h2>Boots </h2>
                <div class="price" data-price="4,799"> ₹4,799 </div>
                <div class="quantity-box">
                    <button onclick="decrease(this)">-</button>
                    <span class="qty">1</span>
                    <button onclick="increase(this)">+</button>
                </div>
            </div>
            <button class="remove-btn" onclick="removeItem(this)"> Remove </button>
        </div>
     <div class="card-item">
            <img src="shopping (5).webp">
            <div class="details">
                <h2>Boots</h2>
                <div class="price" data-price="5,699"> ₹5,699 </div>
                <div class="quantity-box">
                    <button onclick="decrease(this)">-</button>
                    <span class="qty">1</span>
                    <button onclick="increase(this)">+</button>
                </div>
            </div>
            <button class="remove-btn" onclick="removeItem(this)"> Remove </button>
        </div>
    <div class="total-box">
        <h2 id="totalPrice"> Total Price : ₹5,699 </h2>
        <a href="payment.html">
            <button class="payment-btn"> Proceed To Payment </button>
        </a>
    </div><br><br>
    <script>
        function increase(button){
            let qty = button.parentElement.querySelector(".qty");
            qty.innerHTML = Number(qty.innerHTML) + 1;
            updateTotal();
        }
        function decrease(button){
            let qty =button.parentElement.querySelector(".qty");
            if(Number(qty.innerHTML) > 1){
                qty.innerHTML =
                Number(qty.innerHTML) - 1;
            }
            updateTotal();
        }
        function removeItem(button){
            button.parentElement.remove();
            updateTotal();
        }
        function updateTotal(){
            let items =
            document.querySelectorAll(".card-item");
            let total = 0;
            items.forEach(item => {
                let price =
                Number(
                item.querySelector(".price")
                .getAttribute("data-price"));
                let qty =
                Number(
                item.querySelector(".qty")
                .innerHTML);
                total += price * qty;
            });
            document.getElementById("totalPrice")
            .innerHTML =
            "Total Price : ₹" + total;
        }
        function payment(){
            alert("Payment Successful ✅");
        }
    </script>
    <div id="footer1"></div>
    <script src="script.js"></script>
<button onclick="topFunction()" id="topBtn">
    ↑
</button>
<style>
#topBtn{
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 99;
    font-size: 20px;
    border: none;
    outline: none;
    background-color: orange;
    color: white;
    cursor: pointer;
    padding: 12px 18px;
    border-radius: 50%;
}
#topBtn:hover{
    background-color: darkorange;
}
</style>
<script>
let mybutton = document.getElementById("topBtn");
window.onscroll = function() {
    scrollFunction();
};
function scrollFunction() {
    if (document.body.scrollTop > 100 ||
        document.documentElement.scrollTop > 100) {
        mybutton.style.display = "block";
    } else {
        mybutton.style.display = "none";
    }
}
function topFunction() {
    document.body.scrollTop = 0;
    document.documentElement.scrollTop = 0;
}
</script>
</body>
</html>
