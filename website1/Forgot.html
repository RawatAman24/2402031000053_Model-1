<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }
    body{
      background:#f4f4f4;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }
    .forgot-box{
      width:380px;
      background:#fff;
      padding:35px;
      border-radius:10px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      text-align:center;
    }
    .forgot-box h2{
      margin-bottom:15px;
      color:#222;
    }
    .forgot-box p{
      color:#555;
      margin-bottom:25px;
      line-height:1.6;
    }
    .input-box{
      position:relative;
      margin-bottom:20px;
    }
    .input-box input{
      width:100%;
      padding:12px 45px 12px 15px;
      border:1px solid #ccc;
      border-radius:5px;
      outline:none;
      font-size:15px;
    }
    .input-box i{
      position:absolute;
      right:15px;
      top:50%;
      transform:translateY(-50%);
      color:#777;
    }
    .forgot-btn{
      width:100%;
      padding:12px;
      border:none;
      background:orange;
      color:#000;
      font-size:16px;
      font-weight:bold;
      border-radius:5px;
      cursor:pointer;
      transition:0.3s;
    }
    .forgot-btn:hover{
      background:#e69500;
      color:#fff;
    }
    .back-login{
      margin-top:20px;
    }
    .back-login a{
      text-decoration:none;
      color:orange;
      font-weight:bold;
    }
  </style>
</head>
<body>
  <div class="forgot-box">
    <h2>  Forgot Password </h2>
    <p> Enter your email address to reset your password. </p>
    <form>
      <div class="input-box">
        <input type="email" placeholder="Enter Email Address" required>
        <i class="fa-solid fa-envelope"></i>
      </div>
      <button type="submit" class="forgot-btn"> Send Reset Link </button>
    </form>
    <div class="back-login">
      <a href="login.html"> Back to Login </a>
    </div>
  </div>
</body>
</html>
