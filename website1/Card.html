<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Design</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }
    body{
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .card{
      width:300px;
      background:#fff;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      text-align:center;
    }
    .card img{
      width:100%;
      height:200px;
      object-fit:cover;
    }
    .card-content{
      padding:20px;
    }
    .card-content h3{
      margin-bottom:10px;
      color:#222;
    }
    .card-content p{
      color:#555;
      margin-bottom:15px;
    }
    .card-content a{
      text-decoration:none;
      background:orange;
      color:#000;
      padding:10px 20px;
      border-radius:5px;
      display:inline-block;
    }
  </style>
</head>
<div id="header1"></div><br><br>
<body>
    <div class="card">
    <img src="shopping (2).webp" alt="Product">
    <div class="card-content">
      <h3> Product Title </h3>
      <p>
        Stylish and modern product design with premium quality.
      </p>
      <a href="#">Buy Now</a>
    </div>
    <div class="card">
    <img src="shopping (3).webp" alt="Product">
    <div class="card-content">
      <h3> Product Title </h3>
      <p>
        Stylish and modern product design with premium quality.
      </p>
      <a href="#">Buy Now</a>
    </div>
  </div>
  <div id="footer1"></div>
    <script src="script.js"></script>
</body>
</html>
