<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boot Store</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }
    body{
      background:#f4f4f4;
    }
    nav{
      background:#222;
      padding:15px 20px;
    }
    .menu{
      display:flex;
      justify-content:center;
      gap:30px;
      list-style:none;
    }
    .menu li a{
      color:#fff;
      text-decoration:none;
      font-size:18px;
      transition:0.3s;
    }
    .menu li a:hover{
      color:orange;
    }
    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
      padding:40px;
    }
    .card{
      background:#fff;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      text-align:center;
      padding:20px;
    }
    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
      border-radius:10px;
    }
    .card h2{
      margin-top:15px;
      color:#222;
    }
    .card p{
      margin-top:8px;
      color:#555;
    }
    .price{
      font-size:20px;
      color:green;
      font-weight:bold;
      margin-top:10px;
    }
    .btn-box{
      margin-top:15px;
      display:flex;
      justify-content:center;
      gap:10px;
    }
    .buy-btn,
    .cart-btn{
      text-decoration:none;
      padding:10px 18px;
      border-radius:6px;
      color:#fff;
      transition:0.3s;
      display:inline-block;
    }
    .buy-btn{
      background:orange;
    }
    .buy-btn:hover{
      background:darkorange;
    }
    .cart-btn{
      background:#222;
    }
    .cart-btn:hover{
      background:#444;
    }
  </style>
</head>
<body>
  <nav>
    <ul class="menu">
      <li><a href="Home.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="cart.html">Cart</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
  </nav>
  <div class="products">
    <div class="card">
      <img src="shopping (1).webp" alt="Boot">
      <h2>Boots</h2>
      <p>Crosshunt Waterproof Boot</p>
      <div class="price">₹3,599</div>
      <div class="btn-box">
        <a href="payment.html" class="buy-btn"> Buy Now  </a>
        <a href="cart.html" class="cart-btn"> Add to Cart </a>
      </div>
    </div>
    <div class="card">
      <img src="shopping (2).webp" alt="Boot">
      <h2>Boots</h2>
      <p>Hitz Men's Lace-up Ankle Boot</p>
      <div class="price">₹4,599</div>
      <div class="btn-box">
        <a href="payment.html" class="buy-btn"> Buy Now </a>
        <a href="cart.html" class="cart-btn"> Add to Cart </a>
      </div>
    </div>
    <div class="card">
      <img src="shopping (3).webp" alt="Boot">
      <h2>Boots</h2>
      <p>Vellinto Men's Stony Casual</p>
      <div class="price">₹3,599</div>
      <div class="btn-box">
        <a href="payment.html" class="buy-btn"> Buy Now </a>
        <a href="cart.html" class="cart-btn"> Add to Cart </a>
      </div>
    </div>
  </div>
</body>
</html>
