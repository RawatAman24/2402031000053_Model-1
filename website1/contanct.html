<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contanct Form</title>
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <div class="form-group">
  <label for="contact_no">Contact No.</label>
  <input 
    type="tel" id="contact_no" name="contact_no" 
    placeholder="e.g. 635163091"
    pattern="[6-9]{1}[0-9]{9}" 
    title="Please enter a valid 10-digit mobile number starting with 6-9" required>
  <span class="help-text"> Must be 10 digits only . </span>
</div>
<style>
  .form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 1.5rem;
  }
  label {
    font-weight: bold;
    margin-bottom: 0.5rem;
    color: #333;
  }
  input {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 16px;
  }
  input:invalid:focus {
    border-color: #ff4d4d;
    outline: none;
  }
  input:valid:focus {
    border-color: #4CAF50;
  }
  .help-text {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
  }
</style>
</head>
<body>
  <div class="register-box">
    <h2> Create Account </h2>
    <form>
      <div class="input-box">
        <input type="text" placeholder="Full Name" required>
        <i class="fa-solid fa-user"></i>
      </div>
      <div class="input-box">
        <input type="email" placeholder="Email Address" required>
        <i class="fa-solid fa-envelope"></i>
      </div>
      <div class="input-box">
        <input type="tel" placeholder="Phone Number" required>
        <i class="fa-solid fa-phone"></i>
      </div>
      <div class="input-box">
        <input type="password" placeholder="Password" required>
        <i class="fa-solid fa-lock"></i>
      </div>
      <div class="input-box">
        <input type="password" placeholder="Confirm Password" required>
        <i class="fa-solid fa-lock"></i>
      </div>
      <button type="submit" class="register-btn">
        Register
      </button>
      <div class="login-link">
        Already have an account?
        <a href="#">Login</a>
      </div>
    </form>
  </div>
  <div id="footer1"></div>
    <script src="script.js"></script>
</body>
</html>
